# Concierge Intake Package
# Version 1.0.0 - Initial release

doc_type_id: concierge_intake
display_name: "Concierge Intake"
version: "1.0.0"
description: >
  Structured intake document produced by the Concierge workflow.
  Contains synthesized intent, constraints, and gate outcomes from
  the intake conversation. First document in the pipeline.

# Classification
authority_level: descriptive  # Descriptive - captures what user wants
creation_mode: llm_generated
production_mode: generate
scope: project

# Rendering
view_docdef: ConciergeIntakeView

# Dependencies
required_inputs: []  # No dependencies - this is the entry point
optional_inputs: []
creates_children: []
parent_doc_type: null

# Shared artifact references
# Note: Concierge uses workflow-specific prompting, not standard document_generator
role_prompt_ref: null
template_ref: null
schema_ref: "schema:concierge_intake:1.0.0"

# Packaged artifacts
artifacts:
  task_prompt: "prompts/task.prompt.txt"
  qa_prompt: null
  reflection_prompt: "prompts/reflection.prompt.txt"
  pgc_context: null
  questions_prompt: null
  schema: "schemas/output.schema.json"

# Tests
tests:
  fixtures: []
  golden_traces: []

# Gating rules
gating_rules:
  lifecycle_states: []
  design_status: []
  acceptance_required: false
  accepted_by: []

# Information Architecture (ADR-054)
# Note: LLM output uses nested objects (summary.description, outcome.status, etc.)
# IA binds to top-level keys; nested rendering handled by SPA block components.
information_architecture:
  version: 2

  sections:
    - id: overview.summary
      label: Project Summary
      binds:
        - path: summary
          render_as: nested-object
          fields:
            - path: description
              render_as: paragraph
            - path: user_statement
              render_as: paragraph

    - id: overview.project_type
      label: Project Type
      binds:
        - path: project_type
          render_as: nested-object
          fields:
            - path: category
              render_as: paragraph
            - path: rationale
              render_as: paragraph

    - id: details.constraints
      label: Constraints
      binds:
        - path: constraints
          render_as: nested-object
          fields:
            - path: explicit
              render_as: string-list
            - path: inferred
              render_as: string-list

    - id: details.open_gaps
      label: Open Gaps
      binds:
        - path: open_gaps
          render_as: nested-object
          fields:
            - path: questions
              render_as: string-list
            - path: missing_context
              render_as: string-list
            - path: assumptions_made
              render_as: string-list

    - id: outcome.gate
      label: Intake Outcome
      binds:
        - path: outcome
          render_as: nested-object
          fields:
            - path: status
              render_as: paragraph
            - path: rationale
              render_as: paragraph
            - path: next_action
              render_as: paragraph

# UI configuration
ui:
  icon: message-circle
  category: intake
  display_order: 5
